<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>THE BROTHER — Gym</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="wrap">
  <div class="topBar">
    <button onclick="location.href='results.html'" class="ghost">← Back</button>
    <div class="pill">THE BROTHER · Gym</div>
  </div>

  <h1>THE BROTHER</h1>
  <p class="sub">One drill at a time. Tight. Focused. Useful.</p>

  <div class="card">
    <div><strong>Subject:</strong> <span id="subjectLabel"></span></div>
    <div style="margin-top:10px;"><strong>Focus:</strong> <span id="focusLabel"></span></div>
    <div style="margin-top:10px;"><strong>Drill:</strong> <span id="drillCounter"></span></div>
    <div style="margin-top:10px;"><strong>Task title:</strong> <span id="taskTitle"></span></div>
  </div>

  <div class="card">
    <div><strong>Question</strong></div>
    <div id="taskQuestion" class="exampleBox"></div>
    <div style="margin-top:14px;"><strong>Must include</strong></div>
    <ul id="mustIncludeList" class="mustList"></ul>
    <div style="margin-top:14px;"><strong>Starter</strong></div>
    <div id="starterBox" class="exampleBox"></div>
    <div class="tiny" style="margin-top:12px;">Paste is blocked here. Type it yourself.</div>
  </div>

  <div class="card">
    <strong>Your answer</strong>
    <textarea id="drillInput" placeholder="Type your answer here..."></textarea>
    <div class="controls">
      <button id="submitDrillBtn" class="goldBtn" type="button">Submit Drill</button>
      <button id="tryAgainBtn" class="ghost" type="button">Try Again</button>
      <button id="nextDrillBtn" class="tealBtn hidden" type="button">Next Drill</button>
      <button id="finishGymBtn" class="tealBtn hidden" type="button">Finish Gym</button>
    </div>
  </div>

  <section id="drillOut" class="card hidden"></section>
  <section id="gymSummary" class="card hidden"></section>
</main>

<footer>
  © Synge Street Games Lab 2026
</footer>

<script src="subject-data.js"></script>
<script src="ai.js"></script>
<script src="drill.js"></script>
</body>
</html>
